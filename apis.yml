    features:
      - name: Projects API
        description: Browse and filter verified carbon projects across removal and avoidance categories.
      - name: Estimates API
        description: >-
          Generate emissions estimates for shipping, flights, vehicles, ecommerce orders, and custom mass-based
          activity.
      - name: Orders API
        description: Place, retrieve, and cancel carbon credit and removal orders programmatically.
      - name: Technologies
        description: Filter projects and orders by technology type (DAC, biochar, mineralization, REDD+, ARR, etc.).
      - name: Beneficiaries
        description: Tag orders with end beneficiaries for transparent attribution.
      - name: Offtake Agreements
        description: Access long-term carbon removal supply through Patch Offtake.
      - name: RFP Tool
        description: Run structured procurement processes for carbon credit purchases.
      - name: OpenAPI 3 Specification
        description: Machine-readable spec available via Swagger UI for code generation and tooling.
    useCases:
      - name: Checkout-Embedded Offsets
        description: Add carbon offsets at checkout in ecommerce, travel, and logistics products.
      - name: ESG Platform Integration
        description: Plug Patch into ESG and carbon accounting platforms as the procurement layer.
      - name: Corporate Climate Programs
        description: Procure verified credits and removals against corporate net-zero targets.
      - name: Climate Tech Funding
        description: Use Offtake to secure long-term offtake commitments for novel carbon removal projects.
      - name: Banking and Fintech
        description: Offer customers carbon offsets alongside payments and banking products.
    integrations:
