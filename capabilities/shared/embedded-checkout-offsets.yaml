naftiko: 1.0.0-alpha2
info:
  label: Patch — Embedded Checkout Offsets
  description: Workflow capability composing Patch project discovery + order placement to embed verified carbon offsets in a checkout flow.
  tags:
  - Patch
  - Carbon Credits
  - Checkout
  - Embedded Climate
  created: '2026-05-24'
  modified: '2026-05-24'
composes:
- carbon-api-projects
- carbon-api-orders
- carbon-api-order-line-items
binds:
- namespace: env
  keys:
    PATCH_API_KEY: PATCH_API_KEY
workflow:
  description: |
    Discover relevant carbon projects, surface them at checkout, then create
    and place a Patch order with line items reflecting the purchased credits.
  steps:
  - id: list-projects
    use: carbon-api-projects.listprojects
    description: Pull a filtered list of verified carbon projects to surface at checkout.
  - id: create-order
    use: carbon-api-orders.createorder
    description: Create a draft Patch order for the buyer's selected project(s) and mass.
  - id: add-line-items
    use: carbon-api-order-line-items.createorderlineitem
    description: Attach one or more line items to the draft order tying vintages and prices to the order.
  - id: place-order
    use: carbon-api-orders.placeorder
    description: Place the order, committing the credits and triggering retirement.
