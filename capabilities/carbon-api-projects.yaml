naftiko: 1.0.0-alpha2
info:
  label: Patch Carbon API — Projects
  description: Patch Carbon API — Projects. 3 operations. Lead operation: Patch List Projects. Self-contained Naftiko capability covering one Patch business surface.
  tags:
  - Patch
  - Carbon Credits
  - Projects
  - Removal
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    PATCH_API_KEY: PATCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: carbon-api-projects
    baseUri: https://api.patch.io/v1
    description: Patch Carbon API — Projects business capability. Self-contained, no shared references.
    auth:
      type: bearer
      tokenEnv: PATCH_API_KEY
    resources:
    - name: projects
      path: /projects
      operations:
      - name: listprojects
        method: GET
        description: Patch List Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-id
      path: /projects/{id}
      operations:
      - name: retrieveproject
        method: GET
        description: Patch Retrieve A Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: projects-technology_types
      path: /projects/technology_types
      operations:
      - name: listtechnologytypes
        method: GET
        description: Patch List Technology Types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
